<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小黄学习日志 - 管理后台</title>
    <style>
        :root {
            --bg: #f5f5f5;
            --card: #ffffff;
            --text: #333;
            --text-secondary: #666;
            --border: #ddd;
            --primary: #2563eb;
            --success: #059669;
            --danger: #dc2626;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        
        .container { max-width: 900px; margin: 0 auto; }
        
        h1 { font-size: 1.5rem; margin-bottom: 1rem; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-right: 0.5rem;
        }
        
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-secondary { background: #666; color: white; }
        
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        
        .form-group { margin-bottom: 1rem; }
        
        label { display: block; margin-bottom: 0.25rem; font-weight: 500; font-size: 0.9rem; }
        
        input, textarea, select {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.9rem;
            font-family: inherit;
            box-sizing: border-box;
        }
        
        textarea { min-height: 80px; resize: vertical; }
        
        .entry-list { margin-top: 1rem; }
        
        .entry-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            border-bottom: 1px solid var(--border);
        }
        
        .entry-item:last-child { border-bottom: none; }
        
        .entry-title { font-weight: 500; }
        
        .entry-meta { font-size: 0.8rem; color: var(--text-secondary); }
        
        .entry-actions { display: flex; gap: 0.5rem; }
        
        .tag {
            display: inline-block;
            padding: 0.125rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            margin-right: 0.25rem;
        }
        
        .tag-skill { background: #dbeafe; color: var(--primary); }
        .tag-project { background: #d1fae5; color: var(--success); }
        .tag-insight { background: #ede9fe; color: #7c3aed; }
        
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        .modal.active { display: flex; }
        
        .modal-content {
            background: var(--card);
            border-radius: 12px;
            padding: 1.5rem;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .modal-title { font-size: 1.1rem; font-weight: 600; }
        
        .modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; }
        
        .empty { text-align: center; padding: 2rem; color: var(--text-secondary); }
        
        .success-msg {
            background: var(--success);
            color: white;
            padding: 0.75rem 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            display: none;
        }
        
        .success-msg.show { display: block; }
        
        .error-msg {
            background: var(--danger);
            color: white;
            padding: 0.75rem 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            display: none;
        }
        
        .error-msg.show { display: block; }
        
        .loading {
            opacity: 0.5;
            pointer-events: none;
        }
        
        .token-input {
            font-family: monospace;
            font-size: 0.85rem;
        }
        
        .help-text {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📝 管理后台</h1>
        <div>
            <button class="btn btn-success" onclick="syncToGitHub()" id="syncBtn">🚀 一键同步到网站</button>
        </div>
    </div>
    
    <div class="success-msg" id="successMsg">保存成功！</div>
    <div class="error-msg" id="errorMsg"></div>
    
    <!-- Token 设置 -->
    <div class="card">
        <h3>🔑 GitHub Token 设置</h3>
        <div class="form-group">
            <label>Personal Access Token</label>
            <input type="password" id="githubToken" class="token-input" placeholder="ghp_xxx...">
            <p class="help-text">
                需要 repo 权限。
                <a href="https://github.com/settings/tokens" target="_blank">创建 Token</a>
            </p>
        </div>
        <button class="btn btn-secondary" onclick="saveToken()">保存 Token</button>
        <button class="btn btn-secondary" onclick="testToken()">测试连接</button>
    </div>
    
    <div class="card">
        <h3>📊 数据统计</h3>
        <p>技能: <span id="statSkills">0</span> | 项目: <span id="statProjects">0</span> | 洞察: <span id="statInsights">0</span> | 总计: <span id="statTotal">0</span></p>
    </div>
    
    <div class="card">
        <h3>🔧 操作</h3>
        <button class="btn btn-primary" onclick="showAddModal()">+ 添加记录</button>
        <button class="btn btn-secondary" onclick="loadFromGitHub()">📥 从网站拉取数据</button>
    </div>
    
    <div class="entry-list">
        <h3>📋 所有记录</h3>
        <div id="entryList"></div>
    </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal" id="entryModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 class="modal-title" id="modalTitle">添加记录</h2>
            <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <form onsubmit="saveEntry(event)">
            <input type="hidden" id="entryId">
            <div class="form-group">
                <label>标题 *</label>
                <input type="text" id="entryTitle" required placeholder="记录标题">
            </div>
            <div class="form-group">
                <label>类型 *</label>
                <select id="entryType">
                    <option value="skill">技能</option>
                    <option value="project">项目</option>
                    <option value="insight">洞察</option>
                </select>
            </div>
            <div class="form-group">
                <label>日期 *</label>
                <input type="date" id="entryDate" required>
            </div>
            <div class="form-group">
                <label>摘要 *</label>
                <textarea id="entrySummary" required placeholder="简短描述..."></textarea>
            </div>
            <div class="form-group">
                <label>详细内容 (可选)</label>
                <textarea id="entryContent" placeholder="详细内容..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">保存</button>
        </form>
    </div>
</div>

<script>
    const REPO_OWNER = 'yunque-dada';
    const REPO_NAME = 'xiaohuang';
    const DATA_FILE = 'data.json';
    const STORAGE_KEY = 'xiaohuang_entries';
    const TOKEN_KEY = 'github_token';
    
    let entries = [];
    
    // Token
    function getToken() {
        return localStorage.getItem(TOKEN_KEY) || '';
    }
    
    function saveToken() {
        const token = document.getElementById('githubToken').value.trim();
        if (token) {
            localStorage.setItem(TOKEN_KEY, token);
            showSuccess('Token 保存成功！');
        }
    }
    
    // API
    async function githubAPI(method, path, body = null) {
        const token = getToken();
        if (!token) {
            showError('请先设置 GitHub Token');
            return null;
        }
        
        const headers = {
            'Authorization': 'Bearer ' + token,
            'Accept': 'application/vnd.github+json',
            'X-GitHub-Api-Version': '2022-11-28'
        };
        
        const url = 'https://api.github.com' + path;
        
        const options = { method, headers };
        if (body) {
            options.body = JSON.stringify(body);
            options.headers['Content-Type'] = 'application/json';
        }
        
        const res = await fetch(url, options);
        if (!res.ok) {
            const err = await res.json();
            throw new Error(err.message || 'API Error');
        }
        
        return res.json();
    }
    
    async function testToken() {
        try {
            const user = await githubAPI('GET', '/user');
            showSuccess('连接成功！用户: ' + user.login);
        } catch (e) {
            showError('连接失败: ' + e.message);
        }
    }
    
    // Load/Save
    function loadFromLocal() {
        const data = localStorage.getItem(STORAGE_KEY);
        if (data) {
            entries = JSON.parse(data);
        }
        render();
    }
    
    function saveToLocal() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    }
    
    async function loadFromGitHub() {
        try {
            const data = await githubAPI('GET', '/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + DATA_FILE);
            const content = atob(data.content);
            entries = JSON.parse(content);
            saveToLocal();
            render();
            showSuccess('从网站拉取数据成功！');
        } catch (e) {
            showError('拉取失败: ' + e.message);
        }
    }
    
    async function syncToGitHub() {
        const btn = document.getElementById('syncBtn');
        btn.classList.add('loading');
        btn.textContent = '同步中...';
        
        try {
            // Get current file SHA
            let sha = null;
            try {
                const existing = await githubAPI('GET', '/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + DATA_FILE);
                sha = existing.sha;
            } catch (e) {
                // File doesn't exist, will create new
            }
            
            // Prepare content
            const content = JSON.stringify(entries, null, 2);
            const encoded = btoa(unescape(encodeURIComponent(content)));
            
            // Upload
            const body = {
                message: 'Update data.json via admin',
                content: encoded
            };
            if (sha) body.sha = sha;
            
            await githubAPI('PUT', '/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + DATA_FILE, body);
            
            showSuccess('同步成功！网站数据已更新~');
        } catch (e) {
            showError('同步失败: ' + e.message);
        } finally {
            btn.classList.remove('loading');
            btn.textContent = '🚀 一键同步到网站';
        }
    }
    
    // Render
    function render() {
        const list = document.getElementById('entryList');
        
        if (entries.length === 0) {
            list.innerHTML = '<div class="empty">暂无记录，点击"添加记录"开始~</div>';
            return;
        }
        
        // Sort
        entries.sort((a, b) => new Date(b.date) - new Date(a.date));
        
        list.innerHTML = entries.map(e => `
            <div class="entry-item">
                <div>
                    <div class="entry-title">${e.title}</div>
                    <div class="entry-meta">
                        <span class="tag tag-${e.type}">${e.type === 'skill' ? '技能' : e.type === 'project' ? '项目' : '洞察'}</span>
                        ${e.date}
                    </div>
                </div>
                <div class="entry-actions">
                    <button class="btn btn-secondary" onclick="editEntry(${e.id})">编辑</button>
                    <button class="btn btn-danger" onclick="deleteEntry(${e.id})">删除</button>
                </div>
            </div>
        `).join('');
        
        // Stats
        const skills = entries.filter(e => e.type === 'skill').length;
        const projects = entries.filter(e => e.type === 'project').length;
        const insights = entries.filter(e => e.type === 'insight').length;
        document.getElementById('statSkills').textContent = skills;
        document.getElementById('statProjects').textContent = projects;
        document.getElementById('statInsights').textContent = insights;
        document.getElementById('statTotal').textContent = entries.length;
    }
    
    // CRUD
    function showAddModal() {
        document.getElementById('modalTitle').textContent = '添加记录';
        document.getElementById('entryId').value = '';
        document.getElementById('entryTitle').value = '';
        document.getElementById('entryType').value = 'skill';
        document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];
        document.getElementById('entrySummary').value = '';
        document.getElementById('entryContent').value = '';
        document.getElementById('entryModal').classList.add('active');
    }
    
    function editEntry(id) {
        const entry = entries.find(e => e.id === id);
        if (!entry) return;
        
        document.getElementById('modalTitle').textContent = '编辑记录';
        document.getElementById('entryId').value = entry.id;
        document.getElementById('entryTitle').value = entry.title;
        document.getElementById('entryType').value = entry.type;
        document.getElementById('entryDate').value = entry.date;
        document.getElementById('entrySummary').value = entry.summary;
        document.getElementById('entryContent').value = entry.content || '';
        document.getElementById('entryModal').classList.add('active');
    }
    
    function saveEntry(e) {
        e.preventDefault();
        
        const id = document.getElementById('entryId').value;
        
        const entry = {
            id: id ? parseInt(id) : Date.now(),
            title: document.getElementById('entryTitle').value,
            type: document.getElementById('entryType').value,
            date: document.getElementById('entryDate').value,
            summary: document.getElementById('entrySummary').value,
            content: document.getElementById('entryContent').value,
            tags: [document.getElementById('entryType').value]
        };
        
        if (id) {
            const index = entries.findIndex(e => e.id === parseInt(id));
            if (index >= 0) entries[index] = entry;
        } else {
            entries.push(entry);
        }
        
        saveToLocal();
        closeModal();
        render();
        showSuccess('保存成功！记得点击"一键同步到网站"~');
    }
    
    function deleteEntry(id) {
        if (!confirm('确定删除这条记录？')) return;
        entries = entries.filter(e => e.id !== id);
        saveToLocal();
        render();
    }
    
    function closeModal() {
        document.getElementById('entryModal').classList.remove('active');
    }
    
    function showSuccess(msg) {
        const el = document.getElementById('successMsg');
        el.textContent = msg;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 3000);
    }
    
    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 5000);
    }
    
    // Init
    document.getElementById('githubToken').value = getToken();
    loadFromLocal();
</script>
</body>
</html>
