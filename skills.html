    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #8b5cf6;
            --primary-light: #a78bfa;
            --secondary: #06b6d4;
            --accent: #f472b6;
            --dark: #030712;
            --card-bg: #111827;
            --card-border: #1f2937;
            --text: #f9fafb;
            --text-muted: #9ca3af;
        }
        body {
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        /* Floating particles */
        .particles {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: 0;
        }
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 15s infinite ease-in-out;
        }
        .particle:nth-child(2) { left: 20%; animation-delay: -2s; background: var(--secondary); }
        .particle:nth-child(3) { left: 40%; animation-delay: -4s; background: var(--accent); }
        .particle:nth-child(4) { left: 60%; animation-delay: -6s; }
        .particle:nth-child(5) { left: 80%; animation-delay: -8s; background: var(--secondary); }
        .particle:nth-child(6) { left: 10%; animation-delay: -10s; background: var(--accent); }
        .particle:nth-child(7) { left: 70%; animation-delay: -12s; }
        .particle:nth-child(8) { left: 90%; animation-delay: -14s; background: var(--primary); }
        @keyframes float {
            0%, 100% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) scale(1); opacity: 0; }
        }
        /* Gradient orbs */
        .orbs {
            position: fixed;
            inset: 0;
            z-index: -1;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
            animation: pulse 8s ease-in-out infinite;
        }
        .orb-1 { width: 600px; height: 600px; background: var(--primary); top: -200px; left: -200px; }
        .orb-2 { width: 500px; height: 500px; background: var(--secondary); bottom: -150px; right: -150px; animation-delay: -4s; }
        .orb-3 { width: 400px; height: 400px; background: var(--accent); top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -2s; opacity: 0.2; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        
        /* Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(3, 7, 18, 0.8);
            backdrop-filter: blur(20px);
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .header-content { max-width: 1200px; margin: 0 auto; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, #c084fc, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        nav { display: flex; gap: 32px; }
        nav a { color: var(--text-muted); font-weight: 500; text-decoration: none; transition: all 0.3s; }
        nav a:hover { color: #c084fc; }
        .mobile-toggle { display: none; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text); }
        
        /* Hero */
        .hero { padding: 160px 24px 80px; text-align: center; position: relative; z-index: 1; }
        .hero h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 30%, #c084fc 50%, #22d3ee 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
            animation: gradient 3s ease infinite;
            background-size: 200% 200%;
        }
        @keyframes gradient { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        .hero p { color: var(--text-muted); font-size: 1.3rem; }
        
        /* Search */
        .search-wrap { max-width: 600px; margin: 0 auto 50px; position: relative; }
        .search-input {
            width: 100%;
            padding: 24px 24px 24px 60px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            font-size: 1.1rem;
            color: var(--text);
            transition: all 0.4s;
        }
        .search-input:focus {
            outline: none;
            border-color: #8b5cf6;
            background: rgba(255,255,255,0.05);
            box-shadow: 0 0 40px rgba(139, 92, 246, 0.2);
        }
        .search-input::placeholder { color: var(--text-muted); }
        .search-icon { position: absolute; left: 24px; top: 50%; transform: translateY(-50%); font-size: 1.2rem; }
        
        /* Filters */
        .filters { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; margin-bottom: 50px; }
        .filter {
            padding: 12px 24px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 30px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--text-muted);
        }
        .filter:hover, .filter.active {
            background: linear-gradient(135deg, #8b5cf6, #06b6d4);
            border-color: transparent;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(139, 92, 246, 0.3);
        }
        
        /* Container */
        .container { max-width: 1300px; margin: 0 auto; padding: 20px 24px 100px; position: relative; z-index: 1; }
        
        /* Stats */
        .stats {
            display: flex;
            justify-content: center;
            gap: 80px;
            margin-bottom: 60px;
            padding: 40px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 30px;
        }
        .stat { text-align: center; }
        .stat-num {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #c084fc, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-label { color: var(--text-muted); margin-top: 8px; }
        
        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 28px; }
        
        /* Card */
        .card {
            background: linear-gradient(145deg, var(--card-bg), #0a0a0f);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 32px;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s ease forwards;
            opacity: 0;
        }
        .card:nth-child(1) { animation-delay: 0.05s; }
        .card:nth-child(2) { animation-delay: 0.1s; }
        .card:nth-child(3) { animation-delay: 0.15s; }
        .card:nth-child(4) { animation-delay: 0.2s; }
        .card:nth-child(5) { animation-delay: 0.25s; }
        .card:nth-child(6) { animation-delay: 0.3s; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #8b5cf6, #22d3ee, #f472b6, transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .card:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: rgba(139, 92, 246, 0.3);
            box-shadow: 
                0 40px 80px rgba(0,0,0,0.5),
                0 0 60px rgba(139, 92, 246, 0.1);
        }
        .card:hover::before { opacity: 1; }
        .card.hidden { display: none; }
        
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .card-badge {
            font-size: 0.75rem;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 500;
        }
        .badge-master { background: rgba(16, 185, 129, 0.15); color: #34d399; }
        .badge-learn { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
        
        .card-icon {
            width: 56px;
            height: 56px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            margin-bottom: 20px;
            position: relative;
        }
        .card-icon::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 20px;
            background: linear-gradient(135deg, #8b5cf6, #22d3ee);
            z-index: -1;
            opacity: 0.4;
            filter: blur(10px);
        }
        
        .card-title { font-size: 1.3rem; font-weight: 600; color: white; margin-bottom: 8px; }
        .card-meta { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; }
        .card-stars { font-size: 0.8rem; color: #c084fc; background: rgba(139, 92, 246, 0.15); padding: 4px 12px; border-radius: 20px; }
        .card-level { font-size: 0.7rem; padding: 4px 10px; border-radius: 12px; }
        .level-easy { background: rgba(16, 185, 129, 0.15); color: #34d399; }
        .level-mid { background: rgba(251, 191, 36, 0.15); color: #fbbf24; }
        .level-hard { background: rgba(239, 68, 68, 0.15); color: #f87171; }
        
        .card-desc { color: var(--text-muted); line-height: 1.8; margin-bottom: 20px; }
        .card-tags { display: flex; gap: 8px; flex-wrap: wrap; }
        .card-tag { padding: 6px 14px; background: rgba(255,255,255,0.05); border-radius: 16px; font-size: 0.75rem; color: var(--text-muted); }
        
        .card-cmd {
            margin-top: 20px;
            padding: 14px 18px;
            background: rgba(0,0,0,0.4);
            border-radius: 14px;
            font-family: monospace;
            font-size: 0.7rem;
            color: #22d3ee;
            overflow-x: auto;
            border: 1px solid rgba(34, 211, 238, 0.1);
        }
        
        .empty { text-align: center; padding: 100px 20px; color: var(--text-muted); display: none; }
        
        footer { text-align: center; padding: 50px 24px; color: var(--text-muted); border-top: 1px solid rgba(255,255,255,0.05); position: relative; z-index: 1; }
        footer a { color: #c084fc; text-decoration: none; }
        
        @media (max-width: 768px) {
            .hero h1 { font-size: 2.5rem; }
            nav { display: none; }
            nav.open { display: flex; flex-direction: column; position: absolute; top: 60px; left: 0; right: 0; background: rgba(3,7,18,0.98); padding: 20px; gap: 16px; }
            .mobile-toggle { display: block; }
            .grid { grid-template-columns: 1fr; }
            .stats { flex-wrap: wrap; gap: 30px; }
        }
    </style>
</head>

        const grid = document.getElementById('grid');
        skills.forEach(skill => {
            const badgeClass = skill.s === "学习中" ? "badge-learn" : "badge-master";
            const badgeText = skill.s === "学习中" ? "📖学习中" : "✅ 已掌握";
            const levelClass = skill.l === "easy" ? "level-easy" : skill.l === "mid" ? "level-mid" : "level-hard";
            const levelText = skill.l === "easy" ? "入门" : skill.l === "mid" ? "进阶" : "高级";
            const tagsHtml = skill.t ? skill.t.map(t => `<span class="card-tag">${t}</span>`).join('') : '';
            const cmdHtml = skill.cmd ? `<div class="card-cmd">${skill.cmd}</div>` : '';
            
            const colors = [
                'linear-gradient(135deg, #fef3c7, #fde68a)',
                'linear-gradient(135deg, #dbeafe, #bfdbfe)',
                'linear-gradient(135deg, #fce7f3, #fbcfe8)',
                'linear-gradient(135deg, #e0e7ff, #ddd6fe)',
                'linear-gradient(135deg, #d1fae5, #a7f3d0)',
                'linear-gradient(135deg, #fed7aa, #fdba74)',
            ];
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            grid.innerHTML += `
                <div class="card" data-category="${skill.c}">
                    <div class="card-top">
                        <span class="card-badge ${badgeClass}">${badgeText}</span>
                    </div>
                    <div class="card-icon" style="background: ${color};">${skill.i}</div>
                    <div class="card-title">${skill.n}</div>
                    <div class="card-meta">
                        <span class="card-stars">${skill.st}</span>
                        <span class="card-level ${levelClass}">${levelText}</span>
                    </div>
                    <div class="card-desc">${skill.d}</div>
                    <div class="card-tags">${tagsHtml}</div>
                    ${cmdHtml}
                </div>
            `;
        });
        
        const input = document.getElementById('searchInput');
        const filters = document.querySelectorAll('.filter');
        const cards = document.querySelectorAll('.card');
        const empty = document.getElementById('empty');
        let curFilter = 'all';
        let curSearch = '';
        
        function filter() {
            let visible = 0;
            cards.forEach(card => {
                const cat = card.dataset.category;
                const name = card.querySelector('.card-title').textContent;
                const desc = card.querySelector('.card-desc').textContent;
                const tags = Array.from(card.querySelectorAll('.card-tag')).map(t => t.textContent).join(' ');
                const text = (name + desc + tags).toLowerCase();
                const matchFilter = curFilter === 'all' || cat === curFilter;
                const matchSearch = curSearch === '' || text.includes(curSearch);
                if (matchFilter && matchSearch) {
                    card.classList.remove('hidden');
                    visible++;
                } else {
                    card.classList.add('hidden');
                }
            });
            empty.style.display = visible === 0 ? 'block' : 'none';
        }
        
        input.addEventListener('input', e => { curSearch = e.target.value.toLowerCase(); filter(); });
        filters.forEach(f => {
            f.addEventListener('click', () => {
                filters.forEach(t => t.classList.remove('active'));
                f.classList.add('active');
                curFilter = f.dataset.f;
                filter();
            });
        });
    </script>
