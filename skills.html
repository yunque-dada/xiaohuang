<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技能库 - 小黄的学习日志</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #6366f1; --primary-light: #818cf8; --secondary: #06b6d4; --accent: #f472b6; --dark: #0a0a0f; --card-bg: #12121a; --card-border: #1e1e2e; --text: #e2e8f0; --text-muted: #94a3b8; }
        body { font-family: 'Noto Sans SC', -apple-system, sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; overflow-x: hidden; }
        .bg-animated { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(ellipse at 20% 20%, rgba(99,102,241,0.15) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(6,182,212,0.1) 0%, transparent 50%), radial-gradient(ellipse at 50% 50%, rgba(244,114,182,0.05) 0%, transparent 70%); z-index: -1; }
        .bg-animated::before { content: ''; position: absolute; inset: 0; background-image: radial-gradient(circle at 25% 25%, rgba(99,102,241,0.03) 1px, transparent 1px), radial-gradient(circle at 75% 75%, rgba(6,182,212,0.03) 1px, transparent 1px); background-size: 60px 60px; animation: drift 20s linear infinite; }
        @keyframes drift { from { background-position: 0 0, 30px 30px; } to { background-position: 60px 60px, 90px 90px; } }
        header { position: fixed; top: 0; left: 0; right: 0; background: rgba(10,10,15,0.8); backdrop-filter: blur(20px); z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .header-content { max-width: 1200px; margin: 0 auto; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, var(--primary-light), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        nav { display: flex; gap: 32px; }
        nav a { color: var(--text-muted); font-weight: 500; text-decoration: none; transition: all 0.3s; }
        nav a:hover { color: var(--primary-light); }
        .mobile-nav-toggle { display: none; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text); }
        .hero { padding: 140px 24px 60px; text-align: center; position: relative; }
        .hero h1 { font-family: 'Space Grotesk', sans-serif; font-size: 3.5rem; font-weight: 700; background: linear-gradient(135deg, #fff 0%, var(--primary-light) 50%, var(--secondary) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 16px; animation: glow 3s ease-in-out infinite alternate; }
        @keyframes glow { from { filter: drop-shadow(0 0 20px rgba(99,102,241,0.3)); } to { filter: drop-shadow(0 0 40px rgba(99,102,241,0.6)); } }
        .hero p { color: var(--text-muted); font-size: 1.2rem; }
        .search-container { max-width: 600px; margin: 0 auto 40px; position: relative; }
        .search-box { width: 100%; padding: 20px 24px 20px 56px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; font-size: 1rem; color: var(--text); transition: all 0.3s; }
        .search-box:focus { outline: none; border-color: var(--primary); background: rgba(255,255,255,0.08); box-shadow: 0 0 30px rgba(99,102,241,0.2); }
        .search-box::placeholder { color: var(--text-muted); }
        .search-icon { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); font-size: 1.2rem; }
        .filter-tags { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-bottom: 40px; }
        .filter-tag { padding: 10px 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; font-size: 0.9rem; cursor: pointer; transition: all 0.3s; color: var(--text-muted); }
        .filter-tag:hover, .filter-tag.active { background: linear-gradient(135deg, var(--primary), var(--secondary)); border-color: transparent; color: white; transform: translateY(-2px); box-shadow: 0 10px 30px rgba(99,102,241,0.3); }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px 24px 80px; }
        .stats-bar { display: flex; justify-content: center; gap: 60px; margin-bottom: 50px; padding: 30px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; backdrop-filter: blur(10px); }
        .stat-item { text-align: center; }
        .stat-num { font-family: 'Space Grotesk', sans-serif; font-size: 2.5rem; font-weight: 700; background: linear-gradient(135deg, var(--primary-light), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-label { color: var(--text-muted); font-size: 0.9rem; margin-top: 4px; }
        .skills-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
        .skill-card { background: linear-gradient(145deg, var(--card-bg), #0d0d12); border: 1px solid var(--card-border); border-radius: 24px; padding: 28px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; overflow: hidden; }
        .skill-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent)); opacity: 0; transition: opacity 0.3s; }
        .skill-card:hover { transform: translateY(-10px) scale(1.02); border-color: rgba(99,102,241,0.3); box-shadow: 0 30px 60px rgba(0,0,0,0.4), 0 0 40px rgba(99,102,241,0.1); }
        .skill-card:hover::before { opacity: 1; }
        .skill-card.hidden { display: none; }
        .skill-header { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
        .skill-icon { width: 52px; height: 52px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 24px; position: relative; }
        .skill-icon::after { content: ''; position: absolute; inset: -2px; border-radius: 18px; background: linear-gradient(135deg, var(--primary), var(--secondary)); z-index: -1; opacity: 0.5; filter: blur(8px); }
        .skill-name { font-size: 1.2rem; font-weight: 600; color: white; }
        .skill-meta { display: flex; gap: 10px; align-items: center; margin-top: 6px; }
        .skill-stats { font-size: 0.75rem; color: var(--primary-light); background: rgba(99,102,241,0.15); padding: 4px 12px; border-radius: 20px; }
        .skill-difficulty { font-size: 0.7rem; padding: 4px 10px; border-radius: 12px; }
        .diff-easy { background: rgba(16,185,129,0.15); color: #34d399; }
        .diff-medium { background: rgba(251,191,36,0.15); color: #fbbf24; }
        .diff-hard { background: rgba(239,68,68,0.15); color: #f87171; }
        .skill-status { position: absolute; top: 16px; right: 16px; font-size: 0.7rem; padding: 6px 12px; border-radius: 20px; font-weight: 500; }
        .status-mastered { background: rgba(16,185,129,0.15); color: #34d399; }
        .status-learning { background: rgba(59,130,246,0.15); color: #60a5fa; }
        .skill-desc { color: var(--text-muted); font-size: 0.9rem; line-height: 1.7; margin-bottom: 16px; }
        .skill-tags { display: flex; gap: 8px; flex-wrap: wrap; }
        .skill-tag { padding: 6px 14px; background: rgba(255,255,255,0.05); border-radius: 16px; font-size: 0.75rem; color: var(--text-muted); }
        .install-cmd { margin-top: 16px; padding: 12px 16px; background: rgba(0,0,0,0.3); border-radius: 12px; font-family: monospace; font-size: 0.7rem; color: #22d3ee; overflow-x: auto; border: 1px solid rgba(34,211,238,0.1); }
        .no-result { text-align: center; padding: 80px 20px; color: var(--text-muted); display: none; }
        footer { text-align: center; padding: 40px 24px; color: var(--text-muted); font-size: 0.85rem; border-top: 1px solid rgba(255,255,255,0.05); }
        footer a { color: var(--primary-light); text-decoration: none; }
        @media (max-width: 768px) { h1 { font-size: 2.2rem; } nav { display: none; } nav.mobile-open { display: flex; flex-direction: column; position: absolute; top: 60px; left: 0; right: 0; background: rgba(10,10,15,0.98); padding: 20px; gap: 16px; } .mobile-nav-toggle { display: block; } .skills-grid { grid-template-columns: 1fr; } .stats-bar { flex-wrap: wrap; gap: 30px; } }
    </style>
</head>
<body>
    <div class="bg-animated"></div>
    <header>
        <div class="header-content">
            <a href="index.html" class="logo">💛 小黄的学习日志</a>
            <button class="mobile-nav-toggle" onclick="document.querySelector('nav').classList.toggle('mobile-open')">☰</button>
            <nav>
                <a href="index.html">🏠 首页</a>
                <a href="skills.html" style="color: var(--primary-light);">🛠️ 技能库</a>
                <a href="#about">关于</a>
            </nav>
        </div>
    </header>
    <section class="hero">
        <h1>🛠️ 技能库</h1>
        <p>已学习的 AI Agent 技能</p>
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-box" id="searchBox" placeholder="搜索技能名称、描述或标签...">
        </div>
        <div class="filter-tags" id="filterTags">
            <span class="filter-tag active" data-filter="all">全部</span>
            <span class="filter-tag" data-filter="搜索">🔍 搜索</span>
            <span class="filter-tag" data-filter="设计">🎨 设计</span>
            <span class="filter-tag" data-filter="商业">💼 商业</span>
            <span class="filter-tag" data-filter="自动化">⚙️ 自动化</span>
            <span class="filter-tag" data-filter="网站">🌐 网站</span>
            <span class="filter-tag" data-filter="内容">📝 内容</span>
            <span class="filter-tag" data-filter="图片">🖼️ 图片</span>
        </div>
    </section>
    <div class="container">
        <div class="stats-bar">
            <div class="stat-item"><div class="stat-num" id="totalSkills">40+</div><div class="stat-label">技能总数</div></div>
            <div class="stat-item"><div class="stat-num" id="masteredCount">25+</div><div class="stat-label">已掌握</div></div>
            <div class="stat-item"><div class="stat-num" id="learningCount">15+</div><div class="stat-label">学习中</div></div>
        </div>
        <div class="skills-grid" id="skillsGrid">
            <!-- Skills will be inserted here -->
        </div>
        <div class="no-result" id="noResult">😢 没有找到匹配的技能</div>
    </div>
    <footer><p>© 2026 小黄的学习日志 | <a href="index.html">返回首页</a></p></footer>
    <script>
        const skills = [
            {category: "搜索", status: "已掌握", icon: "🔍", name: "🔍 搜索", stats: "4.6K⭐", diff: "diff-easy", desc: "Tavily 驱动的 AI 优化网页搜索", tags: ["搜索", "Tavily"], cmd: "npx skills add agenticops/skills --skill search"},
            {category: "搜索", status: "已掌握", icon: "📚", name: "📚 深度研究", stats: "3.7K⭐", diff: "diff-medium", desc: "深度研究技能，多个查询变体", tags: ["研究"], cmd: "npx skills add tul-sh/skills --skill research"},
            {category: "搜索", status: "已掌握", icon: "🎯", name: "🎯 资源策展", stats: "206⭐", diff: "diff-medium", desc: "5阶段资源策展方法论", tags: ["策展"], cmd: "npx skills add anthonywhitney/skills --skill resource-curator"},
            {category: "搜索", status: "已掌握", icon: "🌐", name: "🌐 网页搜索", stats: "4.0K⭐", diff: "diff-easy", desc: "通用网页搜索技能", tags: ["搜索"]},
            {category: "搜索", status: "已掌握", icon: "🔬", name: "🔬 深度研究", stats: "1.4K⭐", diff: "diff-hard", desc: "深度研究能力", tags: ["深度研究"]},
            {category: "设计", status: "已掌握", icon: "🌐", name: "🌐 Web设计指南", stats: "138K⭐", diff: "diff-easy", desc: "Vercel 官方 Web 界面设计指南", cmd: "npx skills add vercel-labs/agent-skills --skill web-design-guidelines"},
            {category: "设计", status: "已掌握", icon: "💻", name: "💻 前端设计", stats: "125K⭐", diff: "diff-medium", desc: "可访问性优先、响应式设计", cmd: "npx skills add anthropics/skills --skill frontend-design"},
            {category: "设计", status: "已掌握", icon: "📄", name: "📄 落地页设计", stats: "2.1K⭐", diff: "diff-medium", desc: "首屏5秒法则，高转化", cmd: "npx skills add tul-sh/skills --skill landing-page-design"},
            {category: "设计", status: "已掌握", icon: "🎨", name: "🎨 Logo设计", stats: "2.1K⭐", diff: "diff-medium", desc: "Wordmark、Icon、Lettermark", cmd: "npx skills add tul-sh/skills --skill logo-design-guide"},
            {category: "设计", status: "已掌握", icon: "📱", name: "📱 移动App设计", stats: "54K⭐", diff: "diff-medium", desc: "简洁导航、大触摸区域", status2: "learning"},
            {category: "设计", status: "已掌握", icon: "📐", name: "📐 Tailwind设计系统", stats: "14.8K⭐", diff: "diff-medium", desc: "Tailwind CSS 设计系统"},
            {category: "商业", status: "已掌握", icon: "📊", name: "📊 商业分析", stats: "544⭐", diff: "diff-medium", desc: "产品发现、市场研究、需求分析", cmd: "npx skills add aj-geddes/claude-code-bmad-skills --skill business-analyst"},
            {category: "商业", status: "已掌握", icon: "📋", name: "📋 商业案例", stats: "166⭐", diff: "diff-medium", desc: "NPV、IRR、投资回收期", cmd: "npx skills add aj-geddes/useful-ai-prompts --skill business-case-development"},
            {category: "商业", status: "已掌握", icon: "🎯", name: "🎯 商业模式画布", stats: "146⭐", diff: "diff-easy", desc: "9个模块：客户细分、价值主张", cmd: "npx skills add scientiacapital/skills --skill business-model-canvas"},
            {category: "商业", status: "已掌握", icon: "🧠", name: "🧠 商业智能", stats: "277⭐", diff: "diff-hard", desc: "数据分析、趋势分析", status2: "learning"},
            {category: "商业", status: "已掌握", icon: "🚀", name: "🚀 创业分析", stats: "157⭐", diff: "diff-medium", desc: "市场机会评估", status2: "learning"},
            {category: "商业", status: "已掌握", icon: "📚", name: "📚 教育商业", stats: "18⭐", diff: "diff-easy", desc: "课程产品设计", status2: "learning"},
            {category: "自动化", status: "已掌握", icon: "🌐", name: "🌐 浏览器自动化", stats: "1.4K⭐", diff: "diff-medium", desc: "网页抓取、表单填写", cmd: "npx skills add anthropics/skills --skill browser-automation"},
            {category: "自动化", status: "已掌握", icon: "🔄", name: "🔄 工作流自动化", stats: "7.7K⭐", diff: "diff-hard", desc: "定时任务、触发器", cmd: "npx skills add anthropics/skills --skill workflow-automation"},
            {category: "自动化", status: "已掌握", icon: "🐙", name: "🐙 部署自动化", stats: "7.5K⭐", diff: "diff-hard", desc: "CI/CD、GitHub Actions", status2: "learning"},
            {category: "自动化", status: "已掌握", icon: "🐦", name: "🐦 Twitter自动化", stats: "27.6K⭐", diff: "diff-hard", desc: "Twitter/X 自动化", status2: "learning"},
            {category: "自动化", status: "已掌握", icon: "📝", name: "📝 飞书自动化", stats: "174⭐", diff: "diff-medium", desc: "消息推送、文档创建", status2: "learning"},
            {category: "网站", status: "已掌握", icon: "🌐", name: "🌐 网站开发", stats: "基础", diff: "diff-easy", desc: "HTML/CSS/JS，GitHub Pages 部署", tags: ["HTML", "CSS", "JS"]},
            {category: "网站", status: "已掌握", icon: "🎨", name: "🎨 Pixa风格", stats: "进阶", diff: "diff-medium", desc: "Bento网格布局、渐变", tags: ["Bento", "渐变"]},
            {category: "网站", status: "已掌握", icon: "⚡", name: "⚡ Tailwind CSS", stats: "进阶", diff: "diff-medium", desc: "实用优先CSS框架"},
            {category: "网站", status: "已掌握", icon: "📱", name: "📱 PWA支持", stats: "进阶", diff: "diff-medium", desc: "渐进式Web应用"},
            {category: "内容", status: "已掌握", icon: "📊", name: "📊 内容策略", stats: "17.8K⭐", diff: "diff-medium", desc: "可搜索 + 可分享内容规划", cmd: "npx skills add coreyhaines31/marketingskills --skill content-strategy"},
            {category: "内容", status: "已掌握", icon: "📱", name: "📱 社交内容", stats: "15.8K⭐", diff: "diff-medium", desc: "目标 + 受众 + 品牌调性", cmd: "npx skills add coreyhaines31/marketingskills --skill social-content"},
            {category: "内容", status: "已掌握", icon: "💼", name: "💼 LinkedIn内容", stats: "2.2K⭐", diff: "diff-easy", desc: "Hook + Body + CTA 结构", cmd: "npx skills add tul-sh/skills --skill linkedin-content"},
            {category: "图片", status: "已掌握", icon: "🎨", name: "🎨 AI图像生成", stats: "31K⭐", diff: "diff-medium", desc: "50+模型：FLUX、Gemini", cmd: "npx skills add tul-sh/skills --skill ai-image-generation"},
            {category: "图片", status: "已掌握", icon: "🖼️", name: "🖼️ OG图片设计", stats: "2.1K⭐", diff: "diff-easy", desc: "社交媒体分享图、预览图", cmd: "npx skills add tul-sh/skills --skill og-image-design"},
        ];
        
        const grid = document.getElementById('skillsGrid');
        skills.forEach(skill => {
            const statusClass = skill.status2 === "learning" ? "status-learning" : "status-mastered";
            const statusText = skill.status2 === "learning" ? "📖学习中" : "✅ 已掌握";
            const tagsHtml = skill.tags ? skill.tags.map(t => `<span class="skill-tag">${t}</span>`).join('') : '';
            const cmdHtml = skill.cmd ? `<div class="install-cmd">${skill.cmd}</div>` : '';
            const diffClass = skill.diff;
            grid.innerHTML += `
                <div class="skill-card" data-category="${skill.category}" data-status="${skill.status}">
                    <span class="skill-status ${statusClass}">${statusText}</span>
                    <div class="skill-header">
                        <div class="skill-icon" style="background: linear-gradient(135deg, #fef3c7, #fde68a);">${skill.icon}</div>
                        <div>
                            <div class="skill-name">${skill.name}</div>
                            <div class="skill-meta"><span class="skill-stats">${skill.stats}</span><span class="skill-difficulty ${diffClass}">${skill.diff === 'diff-easy' ? '入门' : skill.diff === 'diff-medium' ? '进阶' : '高级'}</span></div>
                        </div>
                    </div>
                    <div class="skill-desc">${skill.desc}</div>
                    <div class="skill-tags">${tagsHtml}</div>
                    ${cmdHtml}
                </div>
            `;
        });
        
        const searchBox = document.getElementById('searchBox');
        const filterTags = document.querySelectorAll('.filter-tag');
        const skillCards = document.querySelectorAll('.skill-card');
        const noResult = document.getElementById('noResult');
        let currentFilter = 'all';
        let currentSearch = '';
        
        function filterSkills() {
            let visibleCount = 0;
            skillCards.forEach(card => {
                const category = card.dataset.category;
                const name = card.querySelector('.skill-name').textContent;
                const desc = card.querySelector('.skill-desc').textContent;
                const tags = Array.from(card.querySelectorAll('.skill-tag')).map(t => t.textContent).join(' ');
                const searchText = (name + desc + tags).toLowerCase();
                const matchesFilter = currentFilter === 'all' || category === currentFilter;
                const matchesSearch = currentSearch === '' || searchText.includes(currentSearch);
                if (matchesFilter && matchesSearch) {
                    card.classList.remove('hidden');
                    visibleCount++;
                } else {
                    card.classList.add('hidden');
                }
            });
            noResult.style.display = visibleCount === 0 ? 'block' : 'none';
        }
        
        searchBox.addEventListener('input', e => { currentSearch = e.target.value.toLowerCase(); filterSkills(); });
        filterTags.forEach(tag => {
            tag.addEventListener('click', () => {
                filterTags.forEach(t => t.classList.remove('active'));
                tag.classList.add('active');
                currentFilter = tag.dataset.filter;
                filterSkills();
            });
        });
    </script>
</body>
</html>
