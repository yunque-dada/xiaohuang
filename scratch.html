<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scratch编程 - 小黄的学习日志</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #8b5cf6; --secondary: #06b6d4; --dark: #030712; --text: #f9fafb; --text-muted: #9ca3af; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }
        .particles { position: fixed; inset: 0; overflow: hidden; z-index: 0; pointer-events: none; }
        .particle { position: absolute; width: 4px; height: 4px; background: var(--primary); border-radius: 50%; opacity: 0.3; animation: float 15s infinite ease-in-out; }
        .particle:nth-child(2) { left: 20%; animation-delay: -2s; background: var(--secondary); }
        .particle:nth-child(3) { left: 40%; animation-delay: -4s; }
        @keyframes float { 0%, 100% { transform: translateY(100vh); opacity: 0; } 10% { opacity: 0.3; } 90% { opacity: 0.3; } 100% { transform: translateY(-100vh); opacity: 0; } }
        .orbs { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
        .orb { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.3; }
        .orb-1 { width: 500px; height: 500px; background: var(--primary); top: -150px; left: -150px; }
        .orb-2 { width: 400px; height: 400px; background: var(--secondary); bottom: -100px; right: -100px; }
        header { position: fixed; top: 0; left: 0; right: 0; background: rgba(3,7,18,0.9); backdrop-filter: blur(20px); z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .header-content { max-width: 1400px; margin: 0 auto; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Space Grotesk', sans-serif; font-size: 1.3rem; font-weight: 700; background: linear-gradient(135deg, #c084fc, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
        nav { display: flex; gap: 24px; }
        nav a { color: var(--text-muted); font-weight: 500; text-decoration: none; transition: all 0.3s; font-size: 0.95rem; }
        nav a:hover { color: #c084fc; }
        .container { max-width: 1400px; margin: 0 auto; padding: 100px 24px 40px; position: relative; z-index: 1; }
        h1 { font-family: 'Space Grotesk', sans-serif; font-size: 2.5rem; font-weight: 700; margin-bottom: 16px; text-align: center; }
        .subtitle { color: var(--text-muted); text-align: center; margin-bottom: 30px; font-size: 1.1rem; }
        .scratch-frame { width: 100%; height: 600px; border: none; border-radius: 20px; background: white; }
        .tips { margin-top: 30px; padding: 24px; background: rgba(255,255,255,0.03); border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .tips h3 { color: #c084fc; margin-bottom: 12px; font-size: 1.1rem; }
        .tips ul { color: var(--text-muted); line-height: 2; padding-left: 20px; }
        .tips li { margin-bottom: 8px; }
        footer { text-align: center; padding: 30px; color: var(--text-muted); font-size: 0.85rem; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 40px; }
        footer a { color: #c084fc; text-decoration: none; }
        @media (max-width: 768px) { .scratch-frame { height: 400px; } h1 { font-size: 1.8rem; } }
    </style>
</head>
<body>
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>
    <div class="orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>
    <header>
        <div class="header-content">
            <a href="index.html" class="logo">💛 小黄的学习日志</a>
            <nav>
                <a href="index.html">🏠 首页</a>
                <a href="https://yunque-dada.github.io/lezhao-ai/">🏫 乐造AI</a>
                <a href="scratch.html" style="color: #c084fc;">🧑💻 Scratch</a>
                <a href="skills.html">🛠️ 技能库</a>
                <a href="timeline.html">📅 时间线</a>
            </nav>
        </div>
    </header>
    <div class="container">
        <h1>🧑💻 Scratch 在线编程</h1>
        <p class="subtitle">拖拽积木块，创造你的第一个程序！</p>
        
        <!-- Scratch Embed -->
        <iframe src="https://turbowarp.org/editor" class="scratch-frame" allowtransparency="true" allowfullscreen></iframe>
        
        <div class="tips">
            <h3>💡 Scratch 使用技巧</h3>
            <ul>
                <li>🟡 <strong>绿旗</strong> - 点击运行程序</li>
                <li>🔴 <strong>红点</strong> - 点击停止程序</li>
                <li>📦 <strong>积木块</strong> - 从左侧拖拽到中间区域</li>
                <li>🎨 <strong>角色</strong> - 点击"角色"添加新角色</li>
                <li>🖼️ <strong>背景</strong> - 点击"背景"更换舞台背景</li>
                <li>💾 <strong>保存</strong> - 点击"文件"→"保存到电脑"</li>
            </ul>
        </div>
    </div>
    <footer>
        <p>© 2026 小黄的学习日志 | <a href="https://scratch.mit.edu/" target="_blank">Scratch官网</a></p>
    </footer>
</body>
</html>
